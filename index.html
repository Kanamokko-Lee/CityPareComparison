<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PINmemo Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #1c1c1e;
    color: #f2f2f7;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: 80px;
    min-width: 80px;
    background: #2c2c2e;
    border-right: 1px solid #3a3a3c;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  #sidebar h2 {
    font-size: 11px;
    font-weight: 600;
    color: #8e8e93;
    padding: 12px 10px 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .airport-item {
    padding: 10px 10px;
    cursor: pointer;
    border-bottom: 1px solid #3a3a3c;
    font-size: 13px;
    transition: background 0.15s;
  }
  .airport-item:hover { background: #3a3a3c; }
  .airport-item.active { background: #0a84ff; color: white; }
  .airport-item .airport-id {
    font-size: 10px;
    color: #8e8e93;
    margin-top: 2px;
  }
  .airport-item.active .airport-id { color: rgba(255,255,255,0.7); }

  /* Main content */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top toolbar - title + status only */
  #toolbar {
    padding: 10px 16px;
    background: #2c2c2e;
    border-bottom: 1px solid #3a3a3c;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #toolbar h1 {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
  }
  #status {
    font-size: 12px;
    color: #8e8e93;
    white-space: nowrap;
  }

  /* Content area */
  #content {
    max-width: 100%;
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  #airport-name {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  #airport-body {
    word-break: break-all;
    overflow-wrap: break-word;
    font-size: 16px;
    line-height: 1.8;
    background: #2c2c2e;
    border-radius: 12px;
    padding: 20px;
  }
  .watch-line {
    border-left: 3px solid #30d158;
    padding-left: 8px;
    margin-left: -11px;
  }
  #watch-legend {
    margin-top: 12px;
    font-size: 12px;
    color: #30d158;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #watch-legend::before {
    content: '';
    display: inline-block;
    width: 12px;
    height: 12px;
    border-left: 3px solid #30d158;
  }
  #airport-meta {
    margin-top: 16px;
    font-size: 11px;
    color: #636366;
  }

  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #636366;
    gap: 8px;
  }
  #empty-state .icon { font-size: 48px; }

  /* Bottom bar */
  #bottombar {
    padding: 8px 16px;
    background: #2c2c2e;
    border-top: 1px solid #3a3a3c;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }
  .bottom-btn {
    background: none;
    border: none;
    color: #8e8e93;
    font-size: 22px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    line-height: 1;
  }
  .bottom-btn:hover { background: #3a3a3c; color: #f2f2f7; }

  /* Settings Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #2c2c2e;
    border-radius: 16px;
    padding: 24px;
    width: 360px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #modal h2 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 20px;
  }
  .field-label {
    font-size: 12px;
    color: #8e8e93;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field-input {
    width: 100%;
    background: #3a3a3c;
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    color: #f2f2f7;
    font-size: 14px;
    outline: none;
    margin-bottom: 16px;
    font-family: monospace;
  }
  .field-input::placeholder { color: #636366; }
  .modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn-cancel {
    flex: 1;
    background: #3a3a3c;
    color: #f2f2f7;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-save {
    flex: 1;
    background: #0a84ff;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
  }
  .btn-cancel:hover { background: #48484a; }
  .btn-save:hover { background: #0070d8; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>空港</h2>
  <div id="airport-list"></div>
</div>

<div id="main">
  <div id="toolbar">
    <h1>PINmemo</h1>
    <span id="status"></span>
  </div>

  <div id="content">
    <div id="empty-state">
      <div class="icon">⚙️</div>
      <div>下の設定ボタンからGist IDを設定してください</div>
    </div>
    <div id="airport-detail" style="display:none">
      <div id="airport-name"></div>
      <div id="airport-body"></div>
      <div id="watch-legend">Watch表示行</div>
      <div id="airport-meta"></div>
    </div>
  </div>

  <div id="bottombar">
    <button class="bottom-btn" onclick="loadGist()" title="再読み込み">↻</button>
    <button class="bottom-btn" onclick="openSettings()" title="設定">⚙️</button>
  </div>
</div>

<!-- Settings Modal -->
<div id="modal-overlay" onclick="closeSettingsOnOverlay(event)">
  <div id="modal">
    <h2>⚙️ 設定</h2>
    <div class="field-label">Gist ID</div>
    <input class="field-input" type="text" id="modal-gist-id" placeholder="ae9f42ecc9083c9591938a0676f7b64b">
    <div class="field-label">GitHub Token（プライベートGistの場合）</div>
    <input class="field-input" type="password" id="modal-token" placeholder="ghp_xxxx...">
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-save" onclick="saveSettings()">保存して読み込む</button>
    </div>
  </div>
</div>

<script>
let airports = [];
let selectedIndex = 0;

function openSettings() {
  document.getElementById('modal-gist-id').value = localStorage.getItem('gistId') || '';
  document.getElementById('modal-token').value = localStorage.getItem('gistToken') || '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeSettingsOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeSettings();
}

function saveSettings() {
  const gistId = document.getElementById('modal-gist-id').value.trim();
  const token = document.getElementById('modal-token').value.trim();
  if (gistId) localStorage.setItem('gistId', gistId);
  if (token) localStorage.setItem('gistToken', token);
  else localStorage.removeItem('gistToken');
  closeSettings();
  loadGist();
}

async function loadGist() {
  const gistId = localStorage.getItem('gistId');
  const token = localStorage.getItem('gistToken') || '';
  const status = document.getElementById('status');

  if (!gistId) { openSettings(); return; }

  status.textContent = '読み込み中...';

  const headers = { 'Accept': 'application/vnd.github.v3+json' };
  if (token) headers['Authorization'] = `token ${token}`;

  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const gist = await res.json();

    const fileKey = Object.keys(gist.files).find(k => k.endsWith('.html'));
    if (!fileKey) throw new Error('HTMLファイルが見つかりません');

    airports = parseAirports(gist.files[fileKey].content);
    renderSidebar();
    if (airports.length > 0) selectAirport(0);

    const updatedAt = new Date(gist.updated_at).toLocaleString('ja-JP');
    status.textContent = `${airports.length}空港 · ${updatedAt}`;
  } catch (e) {
    status.textContent = `エラー: ${e.message}`;
  }
}

function parseAirports(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  return Array.from(doc.querySelectorAll('.airport')).map(div => ({
    id: div.dataset.id || '',
    name: div.dataset.name || div.dataset.id || '',
    updated: div.dataset.updated || '',
    watchLineIndices: (div.dataset.watchLines || '')
      .split(',').map(s => parseInt(s)).filter(n => !isNaN(n)),
    body: div.querySelector('.body')?.innerHTML || ''
  }));
}

function renderSidebar() {
  document.getElementById('airport-list').innerHTML = airports.map((a, i) => `
    <div class="airport-item" onclick="selectAirport(${i})">
      ${a.name}
      <div class="airport-id">${a.id}</div>
    </div>
  `).join('');
}

function selectAirport(index) {
  selectedIndex = index;
  document.querySelectorAll('.airport-item').forEach((el, i) =>
    el.classList.toggle('active', i === index));

  const a = airports[index];
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('airport-detail').style.display = 'block';
  document.getElementById('airport-name').textContent = a.name;
  document.getElementById('airport-body').innerHTML =
    renderBodyWithWatchLines(a.body, a.watchLineIndices);

  const updated = a.updated ? new Date(a.updated).toLocaleString('ja-JP') : '不明';
  document.getElementById('airport-meta').textContent =
    `${a.id} · 更新: ${updated}` +
    (a.watchLineIndices.length > 0 ? ` · Watch行: ${a.watchLineIndices.join(', ')}` : '');
}

function renderBodyWithWatchLines(html, watchIndices) {
  if (!html) return '<span style="color:#636366">本文なし</span>';
  const doc = new DOMParser().parseFromString(`<div>${html}</div>`, 'text/html');
  const children = Array.from(doc.querySelector('div').children);
  if (children.length === 0) return html;
  return children.map((el, i) => {
    const wrap = document.createElement('div');
    if (watchIndices.includes(i)) wrap.className = 'watch-line';
    wrap.innerHTML = el.outerHTML;
    return wrap.outerHTML;
  }).join('');
}

window.onload = () => {
  if (localStorage.getItem('gistId')) loadGist();
  else openSettings();
};
</script>
</body>
</html>
