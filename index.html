<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Route Visualizer</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Flight%20Route%20Visualizer%22,%22short_name%22:%22RouteVis%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%231a1a1a%22,%22theme_color%22:%22%232c3e50%22}">
    <meta name="theme-color" content="#2c3e50">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #3498db;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 380px;
            background-color: var(--panel-bg);
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
            overflow-y: auto;
        }
        #map {
            flex: 1;
            height: 100%;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        input[type="file"], textarea {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
        }
        textarea {
            height: 120px;
            resize: vertical;
            font-family: monospace;
            font-size: 11px;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        #status {
            font-size: 12px;
            color: #f1c40f;
            min-height: 18px;
        }
        .legend-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 10px;
        }
        .legend-table th, .legend-table td {
            padding: 6px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        .route-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .color-box {
            width: 12px;
            height: 12px;
            display: inline-block;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Flight Route Visualizer</h2>
        
        <div class="input-group">
            <label>1. フライトプラン画像を解析</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="input-group">
            <label>2. またはテキストを直接ペースト</label>
            <textarea id="textInput" placeholder="VRNT 1 RTNG 01R...&#10;DIST 2551 ESAD 2647 MINF 80678 TRIPF 56460 EET 5.41"></textarea>
        </div>

        <button id="processBtn">ルートをプロット</button>
        <div id="status"></div>

        <div>
            <h2>ルート凡例 (Legend)</h2>
            <table class="legend-table">
                <thead>
                    <tr>
                        <th>有効</th>
                        <th>ルート名</th>
                        <th>TRIPF</th>
                        <th>EET</th>
                    </tr>
                </thead>
                <tbody id="legendBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // --- 1. ダミーのフィックス位置データベース (AIPに基づく主要ポイントの代表値) ---
        // 実運用時はJP-ENRから抽出した完全なJSONに差し替えてください
        const FIX_DB = {
            "NRT": [35.7767, 140.3864],
            "SGN": [10.8188, 106.6519],
            "SAMUS": [34.7833, 137.9500],
            "PIGOK": [34.2000, 137.1000],
            "HCE": [33.5833, 135.9167],
            "YULIA": [28.5000, 129.5000],
            "TONAR": [25.0000, 125.0000],
            "IGMON": [31.5000, 133.0000],
            "IGURU": [27.0000, 127.5000],
            "BUBDO": [32.0000, 136.0000],
            "JOM": [22.0000, 120.0000],
            "MIA": [18.0000, 115.0000],
            "PANDI": [14.0000, 111.0000],
            "SOSPA": [12.5000, 109.5000],
            "VETOM": [11.5000, 108.2000]
        };

        const ROUTE_COLORS = ['#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#1abc9c'];
        let map, routeLayers = [];

        // --- 2. 地図の初期化 ---
        function initMap() {
            map = L.map('map', {
                center: [23.0, 123.0],
                zoom: 5,
                minZoom: 3
            });

            // 航空マップに馴染むダークモードタイル
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            // NRT / SGN にデフォルトピン
            L.marker(FIX_DB.NRT).addTo(map).bindPopup("成田国際空港 (NRT)");
            L.marker(FIX_DB.SGN).addTo(map).bindPopup("タンソンニャット国際空港 (SGN)");
        }

        // --- 3. OCR画像解析処理 ---
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "画像を解析中 (OCR)...";
            
            Tesseract.recognize(file, 'eng', {
                logger: m => { if(m.status === 'recognizing') document.getElementById('status').innerText = `解析中: ${Math.round(m.progress * 100)}%`; }
            }).then(({ data: { text } }) => {
                document.getElementById('textInput').value = text;
                document.getElementById('status').innerText = "解析完了。微調整してプロットしてください。";
            }).catch(err => {
                console.error(err);
                document.getElementById('status').innerText = "OCR解析に失敗しました。";
            });
        });

        // --- 4. テキストのパース & プロット ---
        function parseAndPlot() {
            const text = document.getElementById('textInput').value;
            const statusDiv = document.getElementById('status');
            const legendBody = document.getElementById('legendBody');
            
            // 既存レイヤーのクリア
            routeLayers.forEach(l => map.removeLayer(l));
            routeLayers = [];
            legendBody.innerHTML = '';

            if (!text.trim()) {
                statusDiv.innerText = "テキストを入力またはパースしてください。";
                return;
            }

            // バリアントごとに分割
            const variants = text.split(/VRNT\s+/).slice(1);
            if (variants.length === 0) {
                statusDiv.innerText = "VRNTデータが見つかりませんでした。";
                return;
            }

            variants.forEach((vStr, index) => {
                const lines = vStr.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length < 2) return;

                // ルート名の抽出 (LOZを除外)
                let routeName = "Unknown";
                const viaMatch = vStr.match(/VIA\s+LOZ-?([A-Z0-9]+)/i) || vStr.match(/VIA\s+([A-Z0-9]+)/i);
                if (viaMatch) {
                    routeName = viaMatch[1];
                } else {
                    const firstLineWords = lines[0].split(/\s+/);
                    routeName = firstLineWords.find(w => w.includes('Y') || w.includes('Q') || w.includes('A')) || `VRNT ${index+1}`;
                }

                // TRIPF と EET の抽出
                const tripfMatch = vStr.match(/TRIPF\s+(\d+)/i);
                const eetMatch = vStr.match(/EET\s+([\d\.]+)/i);
                const tripf = tripfMatch ? parseInt(tripfMatch[1]).toLocaleString() + " lbs" : "N/A";
                const eet = eetMatch ? eetMatch[1] : "N/A";

                // ウェイポイントの抽出とマッピング
                // テキスト内の大文字単語（2〜5文字）を適当にピックアップしてFIX_DBと照合
                const color = ROUTE_COLORS[index % ROUTE_COLORS.length];
                const latlngs = [FIX_DB.NRT]; // スタートは成田

                const words = vStr.replace(/[\/\(\)]/g, ' ').split(/\s+/);
                words.forEach(word => {
                    const cleanWord = word.toUpperCase().trim();
                    if (FIX_DB[cleanWord] && cleanWord !== "NRT" && cleanWord !== "SGN") {
                        // 重複防止
                        if (latlngs[latlngs.length - 1] !== FIX_DB[cleanWord]) {
                            latlngs.push(FIX_DB[cleanWord]);
                        }
                    }
                });
                latlngs.push(FIX_DB.SGN); // ゴールはホーチミン

                // ポリラインの作成
                const polyline = L.polyline(latlngs, {
                    color: color,
                    weight: 4,
                    opacity: 0.8
                }).addTo(map);
                
                // ポップアップの設定
                polyline.bindPopup(`<b>Route: ${routeName}</b><br>TRIPF: ${tripf}<br>EET: ${eet}`);
                routeLayers.push(polyline);

                // 凡例テーブルへの追加
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input type="checkbox" checked onchange="toggleRoute(${index}, this.checked)"></td>
                    <td><span class="color-box" style="background-color: ${color}"></span> <b>${routeName}</b></td>
                    <td>${tripf}</td>
                    <td>${eet}</td>
                `;
                legendBody.appendChild(tr);
            });

            // マップの表示範囲をルート全体に合わせる
            if(routeLayers.length > 0) {
                const group = new L.FeatureGroup(routeLayers);
                map.fitBounds(group.getBounds().pad(0.1));
                statusDiv.innerText = `${routeLayers.length}件のルートをプロットしました。`;
            }
        }

        function toggleRoute(index, isVisible) {
            if (isVisible) {
                map.addLayer(routeLayers[index]);
            } else {
                map.removeLayer(routeLayers[index]);
            }
        }

        document.getElementById('processBtn').addEventListener('click', parseAndPlot);
        window.onload = initMap;

        // --- 5. PWA用 Service Worker の登録 ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmaXRjaCcsIGZ1bmN0aW9uKGV2ZW50KSB7IH0pOw==');
        }
    </script>
</body>
</html>
