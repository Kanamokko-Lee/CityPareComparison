<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JL759">
<meta name="theme-color" content="#080d18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>JL759 NRT→SGN Route Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
:root{
  --bg:#080d18; --panel:#0b1220; --border:#1a2e4a; --hi:#1e3d60;
  --text:#c8d8f0; --muted:#4a7a9b; --accent:#6ab8d8;
  --best:#3dca88; --worst:#e05555;
  --hdr:44px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}

/* header */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:calc(var(--hdr) + env(safe-area-inset-top,0px));
  padding-top:env(safe-area-inset-top,0px);
  background:#080d18;border-bottom:1px solid var(--hi);
  display:flex;align-items:center;padding-left:12px;padding-right:12px;gap:8px;
}
#hdr h1{flex:1;font-size:clamp(0.72rem,2.5vw,0.95rem);font-weight:700;letter-spacing:.1em;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr .sub{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--muted);white-space:nowrap}
#ocr-btn{background:#0f2a45;border:1px solid var(--hi);border-radius:5px;padding:5px 11px;
  font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:var(--accent);cursor:pointer;white-space:nowrap;
  transition:background .15s}
#ocr-btn:hover{background:#142f52}
#ocr-btn:disabled{opacity:.4;cursor:default}

/* layout: map + right panel */
#layout{
  position:fixed;
  top:calc(var(--hdr) + env(safe-area-inset-top,0px));
  left:0;right:0;
  bottom:env(safe-area-inset-bottom,0px);
  display:flex;
}
#map-wrap{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%}

/* right sidebar */
#sidebar{
  width:clamp(200px,28vw,280px);
  background:var(--panel);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  flex-shrink:0;
}
#sb-title{
  font-family:'Share Tech Mono',monospace;font-size:0.58rem;
  color:var(--muted);letter-spacing:.15em;text-transform:uppercase;
  padding:8px 10px 5px;border-bottom:1px solid var(--border);flex-shrink:0;
}
#sb-scroll{flex:1;overflow-y:auto;padding:6px 8px 6px;}
#sb-scroll::-webkit-scrollbar{width:3px}
#sb-scroll::-webkit-scrollbar-thumb{background:var(--hi)}

/* route card */
.rc{
  border-left:3px solid transparent;
  border-radius:4px;padding:7px 8px;margin-bottom:6px;cursor:pointer;
  transition:background .15s,opacity .15s;
  background:#0d1b2a;
}
.rc:hover{background:#102030}
.rc.active{background:#0f2238}
.rc.hidden-r{opacity:.3}
.rc-top{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
.rc-label{font-size:0.82rem;font-weight:700;letter-spacing:.06em}
.rc-via{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--muted)}
/* 2-col metrics */
.rc-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.m{background:#080d18;border-radius:3px;padding:3px 6px}
.m-lbl{font-family:'Share Tech Mono',monospace;font-size:0.52rem;color:var(--muted);text-transform:uppercase}
.m-val{font-family:'Share Tech Mono',monospace;font-size:0.82rem;font-weight:bold;color:#9bc4e0}
.m-val.best{color:var(--best)}
.m-val.worst{color:var(--worst)}
/* divider */
.rc-div{height:1px;background:var(--border);margin:4px 0}

/* legend */
#legend{
  position:absolute;bottom:10px;left:10px;
  background:rgba(8,13,24,.9);border:1px solid var(--hi);
  border-radius:5px;padding:7px 10px;z-index:500;
}
#legend .lg-ttl{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.lg-item{display:flex;align-items:center;gap:6px;margin-bottom:3px;cursor:pointer;transition:opacity .2s}
.lg-item.hidden-r{opacity:.3}
.lg-line{width:22px;height:3px;border-radius:1px;flex-shrink:0}
.lg-txt{font-size:0.75rem;font-weight:700;color:#9bc4e0}

/* info bar */
#infobar{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(8,13,24,.88);border:1px solid var(--hi);
  border-radius:14px;padding:3px 12px;z-index:500;pointer-events:none;
  font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--muted);
  white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis;
}

/* map theming */
.leaflet-container{background:#04080f}
.leaflet-tile{filter:brightness(.5) saturate(.3) hue-rotate(200deg)}
.leaflet-control-zoom{border:1px solid var(--hi)!important}
.leaflet-control-zoom a{background:#0b1220!important;color:var(--accent)!important;border-bottom:1px solid var(--border)!important}
.leaflet-popup-content-wrapper{background:#0d1829!important;border:1px solid var(--hi)!important;border-radius:5px!important;box-shadow:0 4px 18px rgba(0,0,0,.7)!important}
.leaflet-popup-tip{background:#0d1829!important}
.leaflet-popup-content{color:var(--text)!important;font-family:'Share Tech Mono',monospace!important;font-size:0.68rem!important;margin:7px 10px!important}
.pop-name{font-size:0.88rem;font-weight:700;color:var(--accent);margin-bottom:2px;font-family:'Rajdhani',sans-serif!important}
.pop-sub{color:var(--muted);font-size:0.6rem;margin-bottom:1px}

/* OCR modal */
#ocr-modal{
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.75);align-items:center;justify-content:center;
}
#ocr-modal.show{display:flex}
#ocr-box{
  background:#0b1220;border:1px solid var(--hi);border-radius:8px;
  padding:20px;width:min(460px,92vw);
}
#ocr-box h2{font-size:0.9rem;font-weight:700;color:var(--accent);letter-spacing:.1em;margin-bottom:12px}
#drop-zone{
  border:2px dashed var(--hi);border-radius:6px;padding:28px 16px;
  text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px;
}
#drop-zone:hover,#drop-zone.drag{border-color:var(--accent)}
#drop-zone p{font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:var(--muted)}
#drop-zone p span{color:var(--accent)}
#file-input{display:none}
#ocr-preview{width:100%;border-radius:4px;margin-bottom:10px;display:none;max-height:200px;object-fit:contain}
#ocr-status{font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:var(--muted);margin-bottom:10px;min-height:1.2em}
.ocr-btns{display:flex;gap:8px;justify-content:flex-end}
.obtn{background:#0f2a45;border:1px solid var(--hi);border-radius:4px;padding:5px 14px;
  font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--accent);cursor:pointer}
.obtn:hover{background:#142f52}
.obtn.primary{background:#1a4060;border-color:var(--accent)}
.obtn:disabled{opacity:.35;cursor:default}
</style>
</head>
<body>

<div id="hdr">
  <h1>✈ JL759 &nbsp;NRT → SGN</h1>
  <span class="sub" id="hdr-sub">CITYPAIR COMPARISON</span>
  <button id="ocr-btn" onclick="openOCR()">📷 画像読込</button>
</div>

<div id="layout">
  <div id="map-wrap">
    <div id="map"></div>
    <div id="infobar">ルートカードをタップして選択</div>
    <div id="legend">
      <div class="lg-ttl">Routes</div>
      <div id="lg-items"></div>
    </div>
  </div>
  <div id="sidebar">
    <div id="sb-title">ROUTE DATA</div>
    <div id="sb-scroll"></div>
  </div>
</div>

<!-- OCR Modal -->
<div id="ocr-modal">
  <div id="ocr-box">
    <h2>📷 CITYPAIR COMPARISON 画像を読み込む</h2>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()"
         ondragover="ev.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <p>タップしてファイルを選択<br><span>または画像をここにドロップ</span></p>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
    <img id="ocr-preview" alt="preview">
    <div id="ocr-status"></div>
    <div class="ocr-btns">
      <button class="obtn" onclick="closeOCR()">キャンセル</button>
      <button class="obtn primary" id="ocr-go" onclick="runOCR()" disabled>解析して表示</button>
    </div>
  </div>
</div>

// Decode base64+gzip -> JSON
async function decodeB64Gz(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes); writer.close();
  const chunks = [];
  for await (const chunk of ds.readable) chunks.push(chunk);
  const all = new Uint8Array(chunks.reduce((a,c)=>a+c.length,0));
  let off=0; for (const c of chunks){all.set(c,off);off+=c.length;}
  return JSON.parse(new TextDecoder().decode(all));
}

async function initDB() {
  if (dbReady) return;
  [NAV_DB, WPT_DB] = await Promise.all([decodeB64Gz(NAV_B64), decodeB64Gz(WPT_B64)]);
  dbReady = true;
}

// Lookup: returns {lat, lon, type, name, confirmed} or null
function lookupPoint(ident) {
  if (!dbReady) return null;
  // Hardcoded fixes for known problematic entries
  const overrides = {
    'NRT': {lat:35.7653,lon:140.3856,type:'APT',name:'成田国際空港',confirmed:true},
    'SGN': {lat:10.8189,lon:106.6520,type:'APT',name:'タンソンニャット国際空港',confirmed:true},
    'MIA': {lat:14.5080,lon:121.0220,type:'VOR',name:'Manila VOR-DME',confirmed:true},
  };
  if (overrides[ident]) return {...overrides[ident],confirmed:true};

  // [lat, lon, type, name]
  if (NAV_DB[ident]) {
    const d = NAV_DB[ident];
    return {lat:d[0],lon:d[1],type:d[2],name:d[3],confirmed:true};
  }
  if (WPT_DB[ident]) {
    const d = WPT_DB[ident];
    return {lat:d[0],lon:d[1],type:'WPT',name:ident,confirmed:true};
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// ROUTE SANITY CHECK
// Remove waypoints that cause implausible jumps
// Max ~600nm per hop for jet, check by great-circle
// ═══════════════════════════════════════════════════════
function gcDist(a, b) {
  const R = 6371, toR = Math.PI/180;
  const dLat = (b.lat-a.lat)*toR, dLon = (b.lon-a.lon)*toR;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*toR)*Math.cos(b.lat*toR)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x)) * 0.539957; // km -> nm
}

function sanitizeRoute(pts) {
  // pts: [{lat,lon,name,...}]
  // Pass 1: remove points that are wildly out of direction
  // Strategy: check bearing deviation. A civil route shouldn't jump backward >90 deg
  if (pts.length <= 2) return pts;
  
  const cleaned = [pts[0]];
  for (let i = 1; i < pts.length; i++) {
    const prev = cleaned[cleaned.length-1];
    const cur  = pts[i];
    const next = pts[i+1] || pts[pts.length-1];
    
    const distPrevCur = gcDist(prev, cur);
    
    // Rule 1: single hop > 800nm is suspicious
    if (distPrevCur > 800) {
      cur._skip = true;
      continue;
    }
    
    // Rule 2: if skipping this point makes the route significantly shorter,
    // check if adding it makes a big detour
    if (next && i < pts.length-1) {
      const distWithout = gcDist(prev, next);
      const distWith = distPrevCur + gcDist(cur, next);
      // If detour ratio > 2.5x, skip this point
      if (distWithout > 0 && distWith / distWithout > 2.5) {
        cur._skip = true;
        continue;
      }
    }
    
    cleaned.push(cur);
  }
  return cleaned;
}

// ═══════════════════════════════════════════════════════
// EET format: hh+mm
// ═══════════════════════════════════════════════════════
function eet(v) {
  const h = Math.floor(v);
  const m = Math.round((v - h) * 100);
  return h + '+' + String(m).padStart(2,'0');
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let ROUTES = [];
let routeLayers = {};
let hidden = new Set();
let selectedId = null;

// Default routes (pre-parsed from known image)
const DEFAULT_ROUTES = [

// ═══════════════════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════════════════
const map = L.map('map', {center:[22,118], zoom:5, zoomControl:true, attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:14}).addTo(map);

// ═══════════════════════════════════════════════════════
// RENDER ROUTES
// ═══════════════════════════════════════════════════════
function resolveWps(rawWps) {
  const pts = rawWps.map(name => {
    const d = lookupPoint(name);
    if (!d) return null;
    return {...d, name};
  }).filter(Boolean);
  return sanitizeRoute(pts);
}

function clearMap() {
  Object.values(routeLayers).forEach(l => map.removeLayer(l));
  routeLayers = {};
  map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l); });
}

function renderRoutes() {
  clearMap();
  const drawnWPs = new Set();

  ROUTES.forEach(r => {
    const pts = resolveWps(r.rawWps);
    r._pts = pts;
    if (!pts.length) return;

    const latlngs = pts.map(p => [p.lat, p.lon]);
    const line = L.polyline(latlngs, {
      color:r.color, weight:3, opacity:.85, dashArray:r.dash, lineJoin:'round'
    }).addTo(map);
    line.on('click', () => selectRoute(r.id));
    routeLayers[r.id] = line;

    // Markers
    pts.forEach(p => {
      if (drawnWPs.has(p.name)) return;
      drawnWPs.add(p.name);
      const isApt = p.type==='APT';
      const isVOR = ['VOR','VOR-DME','VORTAC','TACAN'].includes(p.type);
      const color = p.confirmed ? (isVOR ? '#f0d060' : isApt ? '#7ec8e3' : '#4a8aaa') : '#555';
      const r2 = isApt ? 8 : isVOR ? 5 : 3.5;
      L.circleMarker([p.lat, p.lon], {
        radius:r2, color, fillColor:isApt?'#1a4060':'#0b1220', fillOpacity:.9, weight: isApt?2:1
      }).addTo(map).bindPopup(
        '<div class="pop-name">'+p.name+'</div>'+
        '<div class="pop-sub">'+p.type+(p.confirmed?'':' <span style="color:#c8a040">推定</span>')+'</div>'+
        '<div class="pop-sub">'+p.name+'</div>'+
        '<div class="pop-sub" style="color:#3a6070">'+p.lat.toFixed(4)+'°N '+p.lon.toFixed(4)+'°E</div>',
        {maxWidth:200}
      );
    });
  });

  buildSidebar();
  buildLegend();
  setTimeout(() => selectRoute(ROUTES[0]?.id), 200);
}

// ═══════════════════════════════════════════════════════
// SIDEBAR  
// ═══════════════════════════════════════════════════════
function buildSidebar() {
  const fuels  = ROUTES.map(r=>r.fuel);
  const times  = ROUTES.map(r=>r.time);
  const totals = ROUTES.map(r=>r.total);
  const minF=Math.min(...fuels), maxF=Math.max(...fuels);
  const minT=Math.min(...times), maxT=Math.max(...times);
  const minC=Math.min(...totals), maxC=Math.max(...totals);

  const el = document.getElementById('sb-scroll');
  el.innerHTML = '';

  ROUTES.forEach((r,i) => {
    const fB=r.fuel===minF, fW=r.fuel===maxF;
    const tB=r.time===minT, tW=r.time===maxT;
    const cB=r.total===minC, cW=r.total===maxC;

    const d = document.createElement('div');
    d.className = 'rc';
    d.id = 'card-'+r.id;
    d.style.borderLeftColor = r.color;
    d.innerHTML =
      '<div class="rc-top">'+
        '<span class="rc-label" style="color:'+r.color+'">'+r.label+'</span>'+
        '<span class="rc-via">'+r.via+'</span>'+
      '</div>'+
      '<div class="rc-grid">'+
        '<div class="m"><div class="m-lbl">FUEL</div><div class="m-val '+(fB?'best':fW?'worst':'')+'">'+r.fuel.toLocaleString()+'</div></div>'+
        '<div class="m"><div class="m-lbl">TIME</div><div class="m-val '+(tB?'best':tW?'worst':'')+'">'+eet(r.time)+'</div></div>'+
        '<div class="m"><div class="m-lbl">OVRFLT</div><div class="m-val">'+r.ovflt.toLocaleString()+'</div></div>'+
        '<div class="m"><div class="m-lbl">DIST</div><div class="m-val">'+r.dist+'</div></div>'+
        '<div class="m"><div class="m-lbl">ESAD</div><div class="m-val">'+r.esad+'</div></div>'+
        '<div class="m"><div class="m-lbl">TOTAL</div><div class="m-val '+(cB?'best':cW?'worst':'')+'">'+r.total.toLocaleString()+'</div></div>'+
      '</div>';
    if (i < ROUTES.length-1) d.innerHTML += '<div class="rc-div"></div>';
    d.addEventListener('click', () => selectRoute(r.id));
    el.appendChild(d);
  });
}

function buildLegend() {
  const el = document.getElementById('lg-items');
  el.innerHTML = '';
  ROUTES.forEach(r => {
    const item = document.createElement('div');
    item.className = 'lg-item' + (hidden.has(r.id)?' hidden-r':'');
    item.id = 'lg-'+r.id;
    item.innerHTML =
      '<div class="lg-line" style="background:'+r.color+'"></div>'+
      '<span class="lg-txt">'+r.label+'</span>';
    item.addEventListener('click', e => { e.stopPropagation(); toggleRoute(r.id); });
    el.appendChild(item);
  });
}

// ═══════════════════════════════════════════════════════
// SELECT / TOGGLE
// ═══════════════════════════════════════════════════════
function selectRoute(id) {
  if (!id) return;
  selectedId = id;
  const r = ROUTES.find(x=>x.id===id);
  if (!r) return;

  document.querySelectorAll('.rc').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-'+id);
  if (card) { card.classList.add('active'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  ROUTES.forEach(x => {
    if (!routeLayers[x.id] || hidden.has(x.id)) return;
    routeLayers[x.id].setStyle(x.id===id
      ? {opacity:1.0, weight:5}
      : {opacity:0.18, weight:2});
  });

  if (routeLayers[id]) map.fitBounds(routeLayers[id].getBounds(), {padding:[30,30]});

  document.getElementById('infobar').textContent =
    r.label+' · '+r.via+' · DIST '+r.dist+'nm / EET '+eet(r.time)+' / FUEL '+r.fuel.toLocaleString()+'kg';
}

function toggleRoute(id) {
  const lyr = routeLayers[id];
  const lgEl = document.getElementById('lg-'+id);
  const cardEl = document.getElementById('card-'+id);
  if (hidden.has(id)) {
    hidden.delete(id);
    if (lyr) lyr.addTo(map);
    lgEl && lgEl.classList.remove('hidden-r');
    cardEl && cardEl.classList.remove('hidden-r');
  } else {
    hidden.add(id);
    if (lyr) map.removeLayer(lyr);
    lgEl && lgEl.classList.add('hidden-r');
    cardEl && cardEl.classList.add('hidden-r');
    if (selectedId===id) selectedId=null;
  }
}

// ═══════════════════════════════════════════════════════
// OCR MODAL
// ═══════════════════════════════════════════════════════
let ocrImageB64 = null;

function openOCR() {
  document.getElementById('ocr-modal').classList.add('show');
  document.getElementById('ocr-status').textContent = '';
  document.getElementById('ocr-go').disabled = true;
  document.getElementById('ocr-preview').style.display = 'none';
  ocrImageB64 = null;
}
function closeOCR() {
  document.getElementById('ocr-modal').classList.remove('show');
}

function handleDrop(ev) {
  ev.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  const f = ev.dataTransfer.files[0];
  if (f) handleFile(f);
}
function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    ocrImageB64 = dataUrl.split(',')[1];
    const prev = document.getElementById('ocr-preview');
    prev.src = dataUrl;
    prev.style.display = 'block';
    document.getElementById('ocr-status').textContent = '画像を読み込みました。「解析して表示」を押してください。';
    document.getElementById('ocr-go').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function runOCR() {
  if (!ocrImageB64) return;
  const btn = document.getElementById('ocr-go');
  btn.disabled = true;
  const statusEl = document.getElementById('ocr-status');
  statusEl.textContent = '🔍 Claude APIで解析中…';

  try {
    const prompt = `この画像はJALのFPM (Flight Planning Manual) の CITYPAIR COMPARISON ページです。
以下の情報をJSONで抽出してください。

各VRNTブロックについて:
- "id": VRNT番号 (1,2,3,4,5等の数字)
- "via": VRNTの行の "VIA" の後に書かれたルート名 (例: "LOZ Y52N89Q15")
  ただし LOZ は departure waypoint ではなくルート記述の一部なので、via文字列に含めてよい
- "wps": ウェイポイント/VOR/航空路のリスト。以下のルールで抽出:
  * "0 OPTD" または "42(0)OPTD" などで始まる行のウェイポイント列を読む
  * "DCT" は除外 (Direct を意味するだけ)
  * VRNT行自体に書かれた "LOZ" "Y52" などのルート名も除外
  * 航空路名(Y84, Y52, Q15, A590, N89, M765, B591, G221, Y50など大文字+数字)は除外
  * 残った5文字以内の大文字識別子がウェイポイントまたはVOR
- "fuel": "COST FUEL" の後の数字
- "time": "EET" の後の数字 (例: 5.41)  
- "ovflt": "OVRFLT" の後の数字
- "total": "TOTAL" の後の数字
- "dist": "DIST" の後の数字
- "esad": "ESAD" の後の数字

VRNTの行自体 ("VRNT X RTNG XX VIA ...") はルートメタデータなので、その行のウェイポイントはwpsに含めない。

JSONのみ返してください。例:
{"routes":[{"id":1,"via":"Y52N89Q15","wps":["SAMUS","HCE","YULIA","TONAR","IGURU","KABAM","MESOX","CRA","SOSPA","VETOM"],"fuel":35453,"time":5.41,"ovflt":2161,"total":37614,"dist":2551,"esad":2647}]}`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{
          role:'user',
          content:[
            {type:'image', source:{type:'base64', media_type:'image/jpeg', data:ocrImageB64}},
            {type:'text', text:prompt}
          ]
        }]
      })
    });

    const data = await resp.json();
    const text = data.content?.filter(c=>c.type==='text').map(c=>c.text).join('') || '';
    statusEl.textContent = '✅ 解析完了。ルートを読み込んでいます…';

    // Parse JSON
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    if (!parsed.routes || !parsed.routes.length) throw new Error('ルートが見つかりませんでした');

    // Build route objects
    const COLORS = ['#00c8ff','#f0a030','#a060ef','#30d070','#ff4858','#f0d060','#d07030'];
    const DASHES = [null,'8,4','11,4','5,3','6,3','9,5',null];

    const newRoutes = parsed.routes.map((r, i) => ({
      id: r.id || (i+1),
      label: 'VRNT '+r.id,
      via: r.via || '',
      color: COLORS[i % COLORS.length],
      dash: DASHES[i % DASHES.length],
      fuel: r.fuel || 0,
      time: r.time || 0,
      ovflt: r.ovflt || 0,
      total: r.total || 0,
      dist: r.dist || 0,
      esad: r.esad || 0,
      rawWps: ['NRT', ...(r.wps||[]).filter(w => w && w !== 'NRT' && w !== 'SGN'), 'SGN']
    }));

    ROUTES = newRoutes;
    hidden.clear();
    selectedId = null;
    document.getElementById('hdr-sub').textContent = 'OCR読込済 · '+newRoutes.length+'ルート';

    closeOCR();
    statusEl.textContent = '';
    await initDB();
    renderRoutes();

  } catch(e) {
    statusEl.textContent = '❌ エラー: ' + (e.message||String(e));
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════════════════════
(async () => {
  await initDB();
  ROUTES = DEFAULT_ROUTES;
  renderRoutes();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
})();
</script>
