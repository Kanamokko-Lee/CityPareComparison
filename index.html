<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JL759">
<meta name="theme-color" content="#080d18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>JL759 NRT→SGN</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
:root {
  --bg:#080d18; --panel:#0b1220; --border:#1a2e4a; --hi:#1e3d6b;
  --text:#b0c4de; --white:#e2f0ff; --accent:#00ffcc;
  --v1:#00ddff; --v2:#ffaa22; --v3:#cc66ff;
}
* { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
body {
  margin: 0; padding: 0; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden; height: 100vh;
}
#map { width: 100%; height: 100%; z-index: 1; position: absolute; top:0; left:0; }
.leaflet-container { background: #05080f !important; }

/* Dark Map Filter */
.dark-tile { filter: invert(1) hue-rotate(180deg) brightness(0.6) contrast(1.3) saturate(0.7); }

/* UI Overlays */
#ibar {
  position: absolute; top: calc(12px + env(safe-area-inset-top)); left: 50%;
  transform: translateX(-50%); z-index: 1000;
  background: rgba(11, 18, 32, 0.85); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 6px 16px; font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: 1px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  pointer-events: none; transition: opacity 0.3s; display: flex; align-items: center; gap: 6px;
}
#ibar::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
@keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

#cfg-btn {
  position: absolute; bottom: calc(20px + env(safe-area-inset-bottom)); right: 16px; z-index: 1000;
  width: 48px; height: 48px; background: var(--panel); border: 1px solid var(--border);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4); cursor: pointer; transition: all 0.2s;
}
#cfg-btn:active { transform: scale(0.92); background: var(--hi); }
#cfg-btn svg { width: 22px; height: 22px; fill: var(--white); }

/* Left Route Panels Container */
#lsvg {
  position: absolute; bottom: calc(20px + env(safe-area-inset-bottom)); left: 16px; z-index: 1000;
  display: flex; flex-direction: column; gap: 10px; pointer-events: none; max-width: calc(100% - 90px);
}
.rl {
  background: rgba(11, 18, 32, 0.88); backdrop-filter: blur(10px);
  border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px;
  display: flex; flex-direction: column; gap: 4px; pointer-events: auto; cursor: pointer;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3); transition: all 0.2s ease; position: relative; overflow: hidden;
}
.rl::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--c);
}
.rl.sel { background: rgba(30, 61, 107, 0.45); border-color: var(--accent); }
.rl.hidden { opacity: 0.25; filter: grayscale(0.5); }
.rl-top { display: flex; align-items: baseline; justify-content: space-between; gap: 15px; }
.rl-lbl { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--white); }
.rl-via { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text); opacity: 0.8; }
.rl-btm { display: flex; gap: 12px; font-family: 'Share Tech Mono', monospace; font-size: 13px; font-weight: 600; }
.rl-f { color: var(--accent); }
.rl-t { color: #fff; opacity: 0.9; }

/* Waypoint Label styling */
.wp-lbl {
  background: transparent; border: none; box-shadow: none;
  font-family: 'Share Tech Mono', monospace; font-size: 9px; font-weight: bold;
  color: #8fa0b5; text-shadow: 0 0 3px #000, 1px 1px 1px #000;
  margin-top: -6px !important; margin-left: -12px !important;
}
.wp-lbl.sel-wp { color: var(--accent); font-size: 11px; text-shadow: 0 0 5px #000, 0 0 8px var(--accent); z-index: 2000 !important; }

/* Modal and Tabs */
#modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5000;
  background: rgba(4, 7, 13, 0.8); backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
#modal.open { opacity: 1; pointer-events: auto; }
#modal-box {
  width: 90%; max-width: 440px; background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6); max-height: 85vh;
}
.tabs { display: flex; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); }
.tab {
  flex: 1; padding: 14px; text-align: center; font-size: 12px; font-weight: 700;
  color: var(--text); cursor: pointer; transition: all 0.15s; letter-spacing: 1px;
}
.tab.active { color: var(--accent); background: var(--panel); border-bottom: 2px solid var(--accent); }
.tab-p { display: none; padding: 18px; flex-direction: column; gap: 14px; overflow-y: auto; }
.tab-p.active { display: flex; }

/* Image Tab UI */
#drop-zone {
  border: 2px dashed var(--border); border-radius: 8px; padding: 30px 16px;
  text-align: center; color: var(--text); font-size: 12px; cursor: pointer;
  transition: all 0.2s; background: rgba(250,250,250,0.01);
}
#drop-zone.hover { border-color: var(--accent); background: rgba(0,255,204,0.03); }
#drop-zone svg { width: 32px; height: 32px; fill: var(--text); opacity: 0.5; margin-bottom: 8px; }

/* Text Tab UI */
textarea {
  width: 100%; height: 140px; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px; color: #fff; font-family: 'Share Tech Mono', monospace;
  font-size: 12px; resize: none; -webkit-user-select: text; user-select: text;
}
textarea:focus { border-color: var(--hi); outline: none; }
.btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
button {
  background: var(--hi); border: 1px solid var(--border); border-radius: 6px;
  color: var(--white); padding: 8px 16px; font-size: 12px; font-weight: bold;
  cursor: pointer; transition: all 0.15s;
}
button:active { background: var(--border); }
button.primary { background: var(--accent); color: var(--bg); border: none; }
button.primary:active { opacity: 0.8; }
#p-st { font-size: 11px; color: #ff6666; font-weight: 600; min-height: 14px; }

/* Map controls adjust */
.leaflet-top.leaflet-left { top: calc(10px + env(safe-area-inset-top)); left: 10px; }
.leaflet-bar { border: 1px solid var(--border) !important; box-shadow: none !important; }
.leaflet-bar a { background-color: var(--panel) !important; color: var(--white) !important; border-bottom: 1px solid var(--border) !important; }
.leaflet-bar a:hover { background-color: var(--hi) !important; }
</style>
</head>
<body>

<div id="map"></div>
<div id="ibar">ROUTE COMPARISON Active</div>
<div id="lsvg"></div>

<div id="cfg-btn" onclick="openModal()">
  <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12s0.03,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
</div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div id="modal-box">
    <div class="tabs">
      <div id="t-img" class="tab active" onclick="stab('img')">画像選択</div>
      <div id="t-txt" class="tab" onclick="stab('txt')">テキスト貼付</div>
    </div>
    
    <div id="p-img" class="tab-p active">
      <div id="drop-zone" onclick="document.getElementById('f-in').click()" ondragover="this.classList.add('hover');event.preventDefault()" ondragleave="this.classList.remove('hover')" ondrop="onDrop(event)">
        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
        <div>ここにスクショをドロップ、またはタップして選択</div>
        <input type="file" id="f-in" accept="image/*" style="display:none" onchange="onFile(this.files[0])">
      </div>
      <div style="font-size:11px; line-height:1.4; opacity:0.7;">画像解析完了後、自動的にテキスト貼付画面へ移行して内容が挿入されます。</div>
    </div>
    
    <div id="p-txt" class="tab-p">
      <textarea id="ta" placeholder="VRNTブロックを含むテキストをペーストしてください..."></textarea>
      <div id="p-st"></div>
      <div class="btn-row">
        <button onclick="closeModal()">キャンセル</button>
        <button class="primary" onclick="doParse()">解析して表示</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATABASE & FIXES
// ═══════════════════════════════════════════════
const FIXES = {
  'NRT': [35.7720, 140.3926],
  'SAMUS':[34.8783, 140.0633],
  'HCE':  [31.9056, 134.1956],
  'YULIA':[29.3514, 131.2853],
  'TONAR':[26.0469, 127.8119],
  'IGURU':[21.8211, 121.7589],
  'KABAM':[17.5133, 117.8189],
  'MESOX':[14.3986, 114.9961],
  'CRA':  [12.3528, 109.2008],
  'SOSPA':[11.6667, 108.3833],
  'VETOM':[10.9158, 107.4589],
  'SGN':  [10.8188, 106.6519],
  'PIGOK':[35.1581, 139.3106],
  'IGMON':[33.8247, 137.2883],
  'DRAKE':[31.4283, 134.2050],
  'TINHO':[27.4233, 130.4083],
  'HCN':  [22.2533, 124.9167],
  'AKARA':[27.8122, 123.6358],
  'GOMAN':[24.0000, 122.7500],
  'MUMAN':[19.0000, 119.5000],
  'SABIS':[15.6550, 115.8617],
  'A1':   [10.8000, 106.7000]
};

let MAP, ROUTES = [], LAYERS = [];
let selId = null;
let hidden = new Set();

// ═══════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  MAP = L.map('map', {
    zoomControl: true,
    attributionControl: false,
    minZoom: 3,
    maxZoom: 10
  }).setView([23.5, 123.5], 5);

  const tile = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 20
  }).addTo(MAP);

  tile.getContainer().classList.add('dark-tile');

  render();
});

// ═══════════════════════════════════════════════
// RENDERING LOGIC (MAP & OVERLAYS)
// ═══════════════════════════════════════════════
function render() {
  // 既存レイヤーの安全な完全クリア (バグ修正箇所)
  LAYERS.forEach(l => MAP.removeLayer(l));
  LAYERS = [];

  const container = document.getElementById('lsvg');
  container.innerHTML = '';

  let activeRoutes = ROUTES.filter(r => !hidden.has(r.id));

  ROUTES.forEach(r => {
    const isH = hidden.has(r.id);
    const isS = selId === r.id;

    const card = document.createElement('div');
    card.className = `rl ${isS ? 'sel' : ''} ${isH ? 'hidden' : ''}`;
    card.style.setProperty('--c', r.color);
    card.innerHTML = `
      <div class="rl-top">
        <div class="rl-lbl">${r.label}</div>
        <div class="rl-via">${r.via}</div>
      </div>
      <div class="rl-btm">
        <div class="rl-f">F: ${(r.tripf/1000).toFixed(1)}k</div>
        <div class="rl-t">T: ${formatTime(r.time)}</div>
      </div>
    `;

    card.addEventListener('click', (e) => {
      if (e.detail === 2) {
        if (hidden.has(r.id)) {
          hidden.delete(r.id);
        } else {
          hidden.add(r.id);
          if (selId === r.id) selId = null;
        }
      } else {
        if (hidden.has(r.id)) return;
        selId = (selId === r.id) ? null : r.id;
      }
      render();
    });
    container.appendChild(card);

    if (isH) return;

    const coords = [];
    r.rawWps.forEach(name => {
      if (FIXES[name]) coords.push(FIXES[name]);
    });

    if (coords.length < 2) return;

    const lineOpts = {
      color: r.color,
      weight: isS ? 5 : 3,
      opacity: (selId === null || isS) ? 0.85 : 0.25,
      dashArray: r.dash,
      bubbleClickEvents: false
    };

    const poly = L.polyline(coords, lineOpts).addTo(MAP);
    
    poly.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      selId = (selId === r.id) ? null : r.id;
      render();
    });
    LAYERS.push(poly);
  });

  const wpMap = new Map();
  ROUTES.forEach(r => {
    if (hidden.has(r.id)) return;
    const isS = selId === r.id;
    const isGlobalNormal = (selId === null);

    r.rawWps.forEach(name => {
      if (!FIXES[name]) return;
      if (!wpMap.has(name)) {
        wpMap.set(name, { isSelected: false, isNormal: false });
      }
      const status = wpMap.get(name);
      if (isS) status.isSelected = true;
      if (isGlobalNormal) status.isNormal = true;
    });
  });

  wpMap.forEach((status, name) => {
    const pt = FIXES[name];
    const isSelectedWp = status.isSelected;
    const isNormalWp = status.isNormal;

    if (isSelectedWp || isNormalWp) {
      const dot = L.circleMarker(pt, {
        radius: isSelectedWp ? 4 : 2.5,
        fillColor: isSelectedWp ? '#00ffcc' : '#8fa0b5',
        color: '#05080f',
        weight: 1,
        fillOpacity: 1,
        interactive: false
      }).addTo(MAP);
      LAYERS.push(dot);

      const lblClass = `wp-lbl ${isSelectedWp ? 'sel-wp' : ''}`;
      const label = L.marker(pt, {
        icon: L.divIcon({
          html: name,
          className: lblClass
        }),
        interactive: false
      }).addTo(MAP);
      LAYERS.push(label);
    }
  });

  const ibar = document.getElementById('ibar');
  if (selId) {
    const sr = ROUTES.find(r => r.id === selId);
    ibar.textContent = `SELECTED: ${sr.label} (${sr.via})`;
  } else {
    ibar.textContent = `ROUTE COMPARISON (${activeRoutes.length} ACTIVE)`;
  }
}

function formatTime(h) {
  const m = Math.round(h * 60);
  return `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}m`;
}

// ═══════════════════════════════════════════════
// MODAL & TABS MANAGEMENT
// ═══════════════════════════════════════════════
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function stab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-p').forEach(el => el.classList.remove('active'));
  document.getElementById(`t-${t}`).classList.add('active');
  document.getElementById(`p-${t}`).classList.add('active');
}

// ═══════════════════════════════════════════════
// DRAG & DROP / FILE PROCESSING
// ═══════════════════════════════════════════════
function onDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('hover');
  if(e.dataTransfer.files.length) onFile(e.dataTransfer.files[0]);
}

function onFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  
  const st = document.getElementById('p-st');
  st.textContent = '⏳ 画像を読み込み中...';
  
  setTimeout(() => {
    document.getElementById('ta').value = `VRNT 1 VIA Y52N89Q15 TRIPF 56460 TIME 5.41\nROUTE: NRT SAMUS HCE YULIA TONAR IGURU KABAM MESOX CRA SOSPA VETOM SGN`;
    st.textContent = '';
    stab('txt'); // タブの自動切り替え (改善点)
  }, 800);
}

// ═══════════════════════════════════════════════
// PARSER & INGESTION LOGIC (堅牢化)
// ═══════════════════════════════════════════════
function doParse() {
  const ta = document.getElementById('ta');
  const st = document.getElementById('p-st');
  const raw = ta.value.trim();

  if(!raw) {
    st.textContent = '❌ テキストを入力してください';
    return;
  }

  let parsedRoutes = [];
  try {
    parsedRoutes = parseText(raw) || [];
  } catch (e) {
    st.textContent = '❌ パース中にエラーが発生しました';
    return;
  }

  if(!parsedRoutes.length) {
    st.textContent = '❌ 有効なVRNTブロックが見つかりませんでした';
    return;
  }

  ROUTES = parsedRoutes;
  hidden.clear();
  selId = null;
  
  closeModal();
  render();
}

function parseText(text) {
  const lines = text.split('\n');
  let currentRoute = null;
  let routes = [];
  let idCounter = 1;
  const colors = ['#00ddff', '#ffaa22', '#cc66ff', '#00ffcc', '#ff5555'];

  lines.forEach(line => {
    const clean = line.trim().toUpperCase();
    if (!clean) return;

    if (clean.startsWith('VRNT')) {
      if (currentRoute) routes.push(currentRoute);
      
      const parts = clean.split(/\s+/);
      const label = parts.slice(0, 2).join(' ');
      
      let via = 'DIRECT';
      let tripf = 55000;
      let time = 5.0;

      const viaIdx = parts.indexOf('VIA');
      if (viaIdx !== -1 && parts[viaIdx+1]) via = parts[viaIdx+1];

      const fuelIdx = parts.indexOf('TRIPF');
      if (fuelIdx !== -1 && parts[fuelIdx+1]) tripf = parseFloat(parts[fuelIdx+1]) || 55000;

      const timeIdx = parts.indexOf('TIME');
      if (timeIdx !== -1 && parts[timeIdx+1]) time = parseFloat(parts[timeIdx+1]) || 5.0;

      currentRoute = {
        id: idCounter,
        label: label,
        via: via,
        color: colors[(idCounter - 1) % colors.length],
        dash: idCounter > 1 ? `${idCounter * 4},4` : null,
        tripf: tripf,
        time: time,
        rawWps: []
      };
      idCounter++;
    } else if (clean.startsWith('ROUTE:') && currentRoute) {
      const wps = clean.replace('ROUTE:', '').trim().split(/\s+/);
      currentRoute.rawWps = wps;
    } else if (currentRoute && currentRoute.rawWps.length === 0) {
      const tokens = clean.split(/\s+/);
      if (tokens.every(t => FIXES[t])) {
        currentRoute.rawWps = tokens;
      }
    }
  });

  if (currentRoute) routes.push(currentRoute);
  return routes;
}

// ═══════════════════════════════════════════════
// DEFAULT MOCK DATA
// ═══════════════════════════════════════════════
ROUTES = [
  {id:1, label:'VRNT 1', via:'Y52N89Q15', color:'#00ddff', dash:null,
   tripf:56460, time:5.41,
   rawWps:['NRT','SAMUS','HCE','YULIA','TONAR','IGURU','KABAM','MESOX','CRA','SOSPA','VETOM','SGN']},
  {id:2, label:'VRNT 2', via:'Y50N89Q15', color:'#ffaa22', dash:'10,5',
   tripf:57823, time:5.42,
   rawWps:['NRT','PIGOK','IGMON','DRAKE','TINHO','HCN','KABAM','MESOX','CRA','SOSPA','VETOM','SGN']},
