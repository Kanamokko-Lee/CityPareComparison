<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JL759">
<meta name="theme-color" content="#0a0e1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>JL759 NRT→SGN Route Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

:root {
  --bg:       #0a0e1a;
  --panel:    #0d1525;
  --border:   #1a2e4a;
  --border2:  #1e3a5f;
  --text:     #c8d8f0;
  --muted:    #4a7a9b;
  --accent:   #7ec8e3;
  --card-bg:  #0f1e30;
  --best:     #4ddb9c;
  --worst:    #e06060;
  --hdr-h:    48px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; }

/* ── HEADER ── */
#hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  height: var(--hdr-h);
  background: linear-gradient(90deg,#0d1829,#111e35 50%,#0d1829);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; padding: 0 14px;
  gap: 10px;
  /* safe area for notch */
  padding-top: env(safe-area-inset-top, 0);
  height: calc(var(--hdr-h) + env(safe-area-inset-top, 0));
}
#hdr .title { flex: 1; min-width: 0; }
#hdr h1 { font-size: clamp(0.7rem, 3vw, 1rem); font-weight: 700; letter-spacing: 0.1em; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#hdr p  { font-family: 'Share Tech Mono', monospace; font-size: clamp(0.55rem, 2vw, 0.68rem); color: var(--muted); margin-top: 1px; }
#hdr .badge { background: #0f2a45; border: 1px solid var(--border2); border-radius: 4px; padding: 3px 8px; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; color: var(--accent); white-space: nowrap; }

/* ── LAYOUT ── */
#map {
  position: fixed;
  top: calc(var(--hdr-h) + env(safe-area-inset-top, 0));
  left: 0; right: 0;
  bottom: calc(var(--panel-h, 340px) + env(safe-area-inset-bottom, 0));
  z-index: 1;
}

#panel {
  position: fixed;
  left: 0; right: 0;
  bottom: 0;
  z-index: 800;
  background: var(--panel);
  border-top: 1px solid var(--border2);
  padding-bottom: env(safe-area-inset-bottom, 0);
  display: flex; flex-direction: column;
  height: var(--panel-h, 340px);
  transition: height 0.3s ease;
}

/* pull handle */
#pull-handle {
  display: flex; align-items: center; justify-content: center;
  height: 22px; cursor: ns-resize; flex-shrink: 0;
  touch-action: none;
}
#pull-handle span { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; }

/* tabs */
#tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 7px 4px; background: none; border: none; cursor: pointer;
  font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
  color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* tab content */
.tab-pane { display: none; flex: 1; overflow-y: auto; padding: 8px 10px 4px; }
.tab-pane.active { display: block; }
.tab-pane::-webkit-scrollbar { width: 3px; }
.tab-pane::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── ROUTE CARDS ── */
.route-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-left: 4px solid transparent; border-radius: 5px;
  padding: 8px 10px; margin-bottom: 7px; cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}
.route-card:hover { background: #142540; }
.route-card.active { background: #112236; }
.route-card.hidden-route { opacity: 0.35; }
.rc-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 5px; }
.rc-num { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--muted); }
.rc-name { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em; }
.rc-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.metric { background: #0a1620; border-radius: 3px; padding: 3px 5px; }
.metric .lbl { font-family: 'Share Tech Mono', monospace; font-size: 0.52rem; color: var(--muted); }
.metric .val { font-family: 'Share Tech Mono', monospace; font-size: 0.78rem; color: #a8c8e8; font-weight: bold; }
.val.best { color: var(--best); }
.val.worst { color: var(--worst); }

/* ── MAP SECTION ── */
.sidebar-label { font-family: 'Share Tech Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }

/* ── COMPARE TABLE ── */
#cmp-tbl { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
#cmp-tbl th { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; color: var(--muted); text-transform: uppercase; padding: 4px 6px; border-bottom: 1px solid var(--border); text-align: right; letter-spacing: 0.08em; }
#cmp-tbl th:first-child { text-align: left; }
#cmp-tbl td { padding: 4px 6px; border-bottom: 1px solid #111a28; font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: #8aaccc; text-align: right; }
#cmp-tbl td:first-child { text-align: left; }
#cmp-tbl td.best { color: var(--best); }
#cmp-tbl td.worst { color: var(--worst); }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; flex-shrink: 0; }

/* ── WAYPOINT PANE ── */
.wp-route-name { font-size: 0.82rem; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.06em; }
.wp-list { display: flex; flex-wrap: wrap; gap: 4px; }
.wp-tag { background: var(--card-bg); border: 1px solid var(--border); border-radius: 3px; padding: 2px 7px; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; color: #6a9ec0; }
.wp-tag.confirmed { border-color: #1e5a3a; color: var(--best); }
.wp-tag.estimated { border-color: #4a3a10; color: #c8a040; }

/* ── MAP OVERLAYS ── */
.leaflet-container { background: #060c18; }
.leaflet-tile { filter: brightness(0.55) saturate(0.35) hue-rotate(195deg); }
.leaflet-popup-content-wrapper { background: #0d1829 !important; border: 1px solid var(--border2) !important; border-radius: 6px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.7) !important; }
.leaflet-popup-tip { background: #0d1829 !important; }
.leaflet-popup-content { color: var(--text) !important; font-family: 'Share Tech Mono', monospace !important; font-size: 0.7rem !important; margin: 8px 12px !important; }
.pop-name { font-size: 0.9rem; font-weight: 700; color: var(--accent); margin-bottom: 3px; font-family: 'Rajdhani', sans-serif !important; letter-spacing: 0.08em; }
.pop-sub  { color: var(--muted); font-size: 0.62rem; margin-bottom: 2px; }
.pop-coord { color: #4a7a9b; font-size: 0.62rem; }

/* Legend overlay */
#legend {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(10,20,35,0.92); border: 1px solid var(--border2);
  border-radius: 6px; padding: 8px 12px; z-index: 500; min-width: 130px;
}
#legend .lg-title { font-family: 'Share Tech Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
.lg-item { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; cursor: pointer; transition: opacity 0.2s; }
.lg-item.hidden-route { opacity: 0.35; }
.lg-line { width: 26px; height: 3px; border-radius: 2px; flex-shrink: 0; }
.lg-text { font-family: 'Rajdhani', sans-serif; font-size: 0.78rem; font-weight: 600; color: #a8c8e8; }

/* Info bar on map */
#info-bar {
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(10,20,35,0.88); border: 1px solid var(--border2);
  border-radius: 16px; padding: 4px 14px;
  font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; color: var(--muted);
  z-index: 500; pointer-events: none; white-space: nowrap;
  max-width: 90%; overflow: hidden; text-overflow: ellipsis;
}

/* zoom control override */
.leaflet-control-zoom { border: 1px solid var(--border2) !important; }
.leaflet-control-zoom a { background: #0d1829 !important; color: var(--accent) !important; border-bottom: 1px solid var(--border) !important; }
.leaflet-control-zoom a:hover { background: #142540 !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="title">
    <h1>✈ JL759 &nbsp; NRT → SGN &nbsp; CITYPAIR COMPARISON</h1>
    <p>06 JUN 2026 &nbsp;|&nbsp; JA844J 788 &nbsp;|&nbsp; ZFW 310034</p>
  </div>
  <div class="badge">FPM JAL0759</div>
</div>

<!-- MAP -->
<div id="map">
  <div id="info-bar">ルートカードをタップして選択 | ウェイポイントをタップして詳細</div>
  <div id="legend">
    <div class="lg-title">Routes</div>
    <div id="lg-items"></div>
  </div>
</div>

<!-- BOTTOM PANEL -->
<div id="panel">
  <div id="pull-handle"><span></span></div>
  <div id="tabs">
    <button class="tab-btn active" data-tab="routes">Routes</button>
    <button class="tab-btn" data-tab="compare">Compare</button>
    <button class="tab-btn" data-tab="waypoints">Waypoints</button>
  </div>
  <div class="tab-pane active" id="tab-routes"></div>
  <div class="tab-pane" id="tab-compare">
    <table id="cmp-tbl">
      <thead><tr>
        <th>Route</th><th>Fuel kg</th><th>時間</th><th>OVR</th><th>DIST</th><th>Total</th>
      </tr></thead>
      <tbody id="cmp-body"></tbody>
    </table>
  </div>
  <div class="tab-pane" id="tab-waypoints">
    <div id="wp-content"><p style="color:var(--muted);font-size:0.75rem;font-family:'Share Tech Mono',monospace">ルートを選択してください</p></div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// DATA  ── 全ポイント座標
// confirmed = OurAirports/OpenNav実データ
// estimated = 航路文脈から補間
// ═══════════════════════════════════════════════
const WP = {

  'JOM':   { lat:14.7049, lon:122.3300, type:'VOR',  name:'ホマリグ VOR-DME', confirmed:true },
  'MIA':   { lat:14.5080, lon:121.0220, type:'VOR',  name:'マニラ VOR-DME', confirmed:true },

  // Estimated (前後ポイント補間)
  'LOZ':   { lat:34.7800, lon:137.1000, type:'WPT',  name:'LOZ (伊勢湾付近 推定)', confirmed:false },
  'SAMUS': { lat:33.6000, lon:133.0000, type:'WPT',  name:'SAMUS (四国南方 推定)', confirmed:false },
  'TONAR': { lat:29.8907, lon:131.6869, type:'WPT',  name:'TONAR', confirmed:true },
  'PIGOK': { lat:35.3000, lon:139.1000, type:'WPT',  name:'PIGOK (相模湾付近 推定)', confirmed:false },
  'B591':  { lat:25.8000, lon:123.2000, type:'WPT',  name:'B591 (台湾東方 推定)', confirmed:false },
  'G86':   { lat:21.3000, lon:119.2000, type:'WPT',  name:'G86 (バシー海峡北方 推定)', confirmed:false },
  'MADRU': { lat:19.4000, lon:116.3000, type:'WPT',  name:'MADRU (南シナ海 推定)', confirmed:false },
  'SULUX': { lat:17.8000, lon:113.5000, type:'WPT',  name:'SULUX (南シナ海 推定)', confirmed:false },
  'IGLEG': { lat:17.0000, lon:111.2000, type:'WPT',  name:'IGLEG (南シナ海 推定)', confirmed:false },

  'W15':   { lat:11.2000, lon:108.2000, type:'WPT',  name:'W15 (推定)', confirmed:false },
  // A590 route extras
  'A590':  { lat:27.5000, lon:121.8000, type:'AWY',  name:'A590 航路点 (推定)', confirmed:false },
  'N500':  { lat:12.4000, lon:112.0000, type:'WPT',  name:'N500 (推定)', confirmed:false },
  'PTH':   { lat:11.0000, lon:109.7000, type:'WPT',  name:'PTH (推定)', confirmed:false },
  // Route 3 extras
  'Q13':   { lat:24.5000, lon:123.5000, type:'AWY',  name:'Q13 (石垣島付近 推定)', confirmed:false },
  'PICHU': { lat:22.0000, lon:119.8000, type:'WPT',  name:'PICHU (推定)', confirmed:false },
  'J7':    { lat:22.8000, lon:120.5000, type:'AWY',  name:'J7 (台湾南方 推定)', confirmed:false },
  'G221':  { lat:16.2000, lon:110.5000, type:'AWY',  name:'G221 (推定)', confirmed:false },
  'W12':   { lat:13.3000, lon:109.0000, type:'AWY',  name:'W12 (推定)', confirmed:false },
  'Q1':    { lat:11.8000, lon:108.0000, type:'AWY',  name:'Q1 (推定)', confirmed:false },
};

function eet(v) { const h=Math.floor(v), m=Math.round((v-h)*100); return `${h}h${String(m).padStart(2,'0')}m`; }

const ROUTES = [
  {
    id:1, label:'VRNT 1', via:'Y52N89Q15', color:'#00c8ff', dash:null,
    fuel:35453, time:5.41, ovflt:2161, total:37614, dist:2551, esad:2647,
    wps:['NRT','LOZ','SAMUS','HCE','YULIA','TONAR','IGURU','KABAM','MESOX','CRA','SOSPA','W15','VETOM','SGN'],
    note:'Y52N89Q15経由 · 最短時間 · 最安コスト · 八丈島・沖縄・東シナ海経由'
  },
  {
    id:2, label:'VRNT 2', via:'Y50N89Q15', color:'#f0a030', dash:'9,4',
    fuel:36292, time:5.42, ovflt:2160, total:38452, dist:2540, esad:2705,
    wps:['NRT','LOZ','PIGOK','IGMON','DRAKE','TINHO','B591','HCN','KABAM','MESOX','CRA','SOSPA','W15','VETOM','SGN'],
    note:'Y50N89Q15経由 · PIGOK→尖閣南方→台湾東側→東シナ海'
  },
  {
    id:3, label:'VRNT 3', via:'Y52A1', color:'#b06aff', dash:'12,4',
    fuel:36918, time:5.46, ovflt:2199, total:39117, dist:2629, esad:2738,
    wps:['NRT','LOZ','SAMUS','HCE','YULIA','TONAR','IGURU','Q13','PICHU','J7','HCN','G86','KAPLI','MADRU','SULUX','IGLEG','IKELA','BUNTA','G221','PCA','W12','BMT','Q1','DOVIN','SGN'],
    note:'Y52A1経由 · 南シナ海沿岸を南下 · ウェイポイント数最多'
  },
  {
    id:5, label:'VRNT 5', via:'A590M765N5', color:'#40e080', dash:'5,3',
    fuel:37962, time:5.44, ovflt:1841, total:39803, dist:2682, esad:2710,
    wps:['NRT','LOZ','SAMUS','BUBDO','A590','JOM','MIA','MESOX','PANDI','N500','PTH','SGN'],
    note:'A590南シナ海直行 · OVRFLT最小 · 燃料最多'
  },
  {
    id:4, label:'VRNT 4', via:'Y50B591A1', color:'#ff5060', dash:'6,3',
    fuel:37651, time:5.52, ovflt:2201, total:39852, dist:2615, esad:2797,
    wps:['NRT','LOZ','PIGOK','IGMON','DRAKE','TINHO','B591','HCN','G86','KAPLI','MADRU','SULUX','IGLEG','IKELA','BUNTA','G221','PCA','W12','BMT','Q1','DOVIN','SGN'],
    note:'Y50B591A1経由 · 最長飛行時間 · 最高コスト'
  },
];

const fuels  = ROUTES.map(r=>r.fuel);
const times  = ROUTES.map(r=>r.time);
const totals = ROUTES.map(r=>r.total);
const minF=Math.min(...fuels), maxF=Math.max(...fuels);
const minT=Math.min(...times), maxT=Math.max(...times);
const minC=Math.min(...totals), maxC=Math.max(...totals);

// ═══════════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════════
const map = L.map('map', { center:[23,118], zoom:5, zoomControl:true, attributionControl:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:14 }).addTo(map);

const routeLayers = {};
const hidden = new Set();
let selectedId = null;

// Draw routes
ROUTES.forEach(r => {
  const pts = r.wps.filter(w=>WP[w]).map(w=>[WP[w].lat, WP[w].lon]);
  const line = L.polyline(pts, {
    color: r.color, weight:3, opacity:0.85, dashArray:r.dash, lineJoin:'round'
  }).addTo(map);
  line.on('click', () => selectRoute(r.id));
  routeLayers[r.id] = line;
});

// Waypoint markers (draw once, shared)
const drawnWPs = new Set();
ROUTES.forEach(r => {
  r.wps.forEach(name => {
    if (drawnWPs.has(name) || !WP[name]) return;
    drawnWPs.add(name);
    const d = WP[name];
    const isApt = d.type === 'APT';
    const isVOR = d.type === 'VOR';
    const color = d.confirmed ? (isVOR ? '#f0d060' : '#7ec8e3') : '#808080';
    const r2 = isApt ? 8 : isVOR ? 5 : 3;
    L.circleMarker([d.lat, d.lon], {
      radius: r2, color, fillColor: isApt ? '#1a4060' : '#0f1e30',
      fillOpacity:0.9, weight: isApt ? 2 : 1
    }).addTo(map)
     .bindPopup(`
      <div class="pop-name">${name}</div>
      <div class="pop-sub">${d.type}${d.confirmed ? '' : ' <span style="color:#c8a040">（推定位置）</span>'}</div>
      <div class="pop-sub">${d.name}</div>
      <div class="pop-coord">${d.lat.toFixed(4)}°N &nbsp; ${d.lon.toFixed(4)}°E</div>
     `, {maxWidth:200});
  });
});

// ═══════════════════════════════════════════════
// PANEL DRAG (resize)
// ═══════════════════════════════════════════════
const panel = document.getElementById('panel');
const handle = document.getElementById('pull-handle');
let dragY = null, startH = null;
const MIN_H = 140, MAX_H = Math.round(window.innerHeight * 0.75);

function setPanelH(h) {
  h = Math.max(MIN_H, Math.min(MAX_H, h));
  panel.style.height = h + 'px';
  document.documentElement.style.setProperty('--panel-h', h + 'px');
  map.invalidateSize();
}

handle.addEventListener('pointerdown', e => {
  dragY = e.clientY;
  startH = panel.offsetHeight;
  handle.setPointerCapture(e.pointerId);
});
handle.addEventListener('pointermove', e => {
  if (dragY === null) return;
  setPanelH(startH + (dragY - e.clientY));
});
handle.addEventListener('pointerup', () => { dragY = null; });

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ═══════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════
function buildRouteCards() {
  const el = document.getElementById('tab-routes');
  el.innerHTML = '';
  ROUTES.forEach(r => {
    const fB = r.fuel===minF, fW = r.fuel===maxF;
    const tB = r.time===minT, tW = r.time===maxT;
    const cB = r.total===minC, cW = r.total===maxC;
    const card = document.createElement('div');
    card.className = 'route-card';
    card.id = 'card-' + r.id;
    card.style.borderLeftColor = r.color;
    card.innerHTML = `
      <div class="rc-header">
        <span class="rc-num">${r.label}</span>
        <span class="rc-name" style="color:${r.color}">${r.via}</span>
      </div>
      <div class="rc-metrics">
        <div class="metric"><div class="lbl">FUEL</div><div class="val ${fB?'best':fW?'worst':''}">${r.fuel.toLocaleString()}</div></div>
        <div class="metric"><div class="lbl">TIME</div><div class="val ${tB?'best':tW?'worst':''}">${eet(r.time)}</div></div>
        <div class="metric"><div class="lbl">OVR</div><div class="val">${r.ovflt.toLocaleString()}</div></div>
        <div class="metric"><div class="lbl">TOTAL</div><div class="val ${cB?'best':cW?'worst':''}">${r.total.toLocaleString()}</div></div>
      </div>`;
    card.addEventListener('click', () => selectRoute(r.id));
    el.appendChild(card);
  });
}

function buildCompare() {
  const tb = document.getElementById('cmp-body');
  tb.innerHTML = '';
  ROUTES.forEach(r => {
    const fB=r.fuel===minF, fW=r.fuel===maxF;
    const tB=r.time===minT, tW=r.time===maxT;
    const cB=r.total===minC, cW=r.total===maxC;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="dot" style="background:${r.color}"></span>${r.label}</td>
      <td class="${fB?'best':fW?'worst':''}">${r.fuel.toLocaleString()}</td>
      <td class="${tB?'best':tW?'worst':''}">${eet(r.time)}</td>
      <td>${r.ovflt.toLocaleString()}</td>
      <td>${r.dist}</td>
      <td class="${cB?'best':cW?'worst':''}">${r.total.toLocaleString()}</td>`;
    tb.appendChild(tr);
  });
}

function buildLegend() {
  const el = document.getElementById('lg-items');
  el.innerHTML = '';
  ROUTES.forEach(r => {
    const item = document.createElement('div');
    item.className = 'lg-item';
    item.id = 'lg-' + r.id;
    item.innerHTML = `<div class="lg-line" style="background:${r.color};${r.dash?`background:repeating-linear-gradient(90deg,${r.color} 0,${r.color} 8px,transparent 8px,transparent 12px)`:''} "></div><span class="lg-text">${r.label}</span>`;
    item.addEventListener('click', () => toggleRoute(r.id));
    el.appendChild(item);
  });
}

// ═══════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════
function selectRoute(id) {
  selectedId = id;
  const r = ROUTES.find(x=>x.id===id);

  // Cards
  document.querySelectorAll('.route-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('active'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  // Map styles
  ROUTES.forEach(x => {
    if (!routeLayers[x.id] || hidden.has(x.id)) return;
    if (x.id === id) routeLayers[x.id].setStyle({ opacity:1.0, weight:5 });
    else              routeLayers[x.id].setStyle({ opacity:0.18, weight:2 });
  });

  // Fit map
  if (routeLayers[id]) map.fitBounds(routeLayers[id].getBounds(), {padding:[30,30]});

  // Info bar
  document.getElementById('info-bar').textContent =
    `${r.label} · ${r.via} · DIST ${r.dist}nm / ESAD ${r.esad}nm`;

  // Waypoints pane
  const wpEl = document.getElementById('wp-content');
  const confirmed = r.wps.filter(w=>WP[w]&&WP[w].confirmed);
  const estimated = r.wps.filter(w=>WP[w]&&!WP[w].confirmed);
  wpEl.innerHTML = `
    <div class="wp-route-name" style="color:${r.color}">${r.label} · ${r.via}</div>
    <p style="font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--muted);margin-bottom:8px">${r.note}</p>
    <div class="sidebar-label" style="margin-bottom:6px">確認済みポイント (${confirmed.length})</div>
    <div class="wp-list" style="margin-bottom:10px">${confirmed.map(w=>`<span class="wp-tag confirmed">${w}</span>`).join('')}</div>
    <div class="sidebar-label" style="margin-bottom:6px">推定位置 (${estimated.length})</div>
    <div class="wp-list">${estimated.map(w=>`<span class="wp-tag estimated">${w}</span>`).join('')}</div>
  `;
}

function toggleRoute(id) {
  const lyr = routeLayers[id];
  const lgEl = document.getElementById('lg-' + id);
  const cardEl = document.getElementById('card-' + id);
  if (hidden.has(id)) {
    hidden.delete(id);
    lyr.addTo(map);
    lgEl && lgEl.classList.remove('hidden-route');
    cardEl && cardEl.classList.remove('hidden-route');
  } else {
    hidden.add(id);
    map.removeLayer(lyr);
    lgEl && lgEl.classList.add('hidden-route');
    cardEl && cardEl.classList.add('hidden-route');
    if (selectedId === id) selectedId = null;
  }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
buildRouteCards();
buildCompare();
buildLegend();
setTimeout(() => selectRoute(1), 400);

// ═══════════════════════════════════════════════
// PWA – Service Worker
// ═══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
