<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');
:root{--bg:#080d18;--panel:#0b1220;--border:#1a2e4a;--hi:#1e3d60;--text:#c8d8f0;--muted:#4a7a9b;--accent:#6ab8d8;--best:#3dca88;--worst:#e05555;--hdr:44px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}
#hdr{position:fixed;top:0;left:0;right:0;z-index:900;height:calc(var(--hdr) + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);background:#080d18;border-bottom:1px solid var(--hi);display:flex;align-items:center;padding-left:12px;padding-right:12px;gap:8px}
#hdr h1{flex:1;font-size:clamp(0.7rem,2.4vw,0.92rem);font-weight:700;letter-spacing:.1em;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-sub{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--muted);white-space:nowrap;display:none}
@media(min-width:480px){#hdr-sub{display:block}}
#inp-btn{background:#0f2a45;border:1px solid var(--hi);border-radius:5px;padding:5px 10px;font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--accent);cursor:pointer;white-space:nowrap;flex-shrink:0}
#inp-btn:hover{background:#142f52}
#layout{position:fixed;top:calc(var(--hdr) + env(safe-area-inset-top,0px));left:0;right:0;bottom:env(safe-area-inset-bottom,0px);display:flex}
#map-wrap{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%}
#sidebar{width:clamp(170px,25vw,250px);background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#sb-ttl{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;padding:7px 9px 5px;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-body{flex:1;overflow-y:auto;padding:5px 7px}
#sb-body::-webkit-scrollbar{width:3px}
#sb-body::-webkit-scrollbar-thumb{background:var(--hi)}
.rc{border-left:3px solid transparent;border-radius:4px;padding:6px 7px;margin-bottom:5px;cursor:pointer;background:#0d1b2a;transition:background .15s}
.rc:hover{background:#102030}
.rc.sel{background:#0f2238}
.rc.off{opacity:.25}
.rc-top{display:flex;align-items:baseline;gap:5px;margin-bottom:3px}
.rc-lbl{font-size:0.85rem;font-weight:700;letter-spacing:.06em}
.rc-via{font-family:'Share Tech Mono',monospace;font-size:0.52rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.rc-g{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.m{background:#080d18;border-radius:3px;padding:2px 5px}
.ml{font-family:'Share Tech Mono',monospace;font-size:0.48rem;color:var(--muted);text-transform:uppercase}
.mv{font-family:'Share Tech Mono',monospace;font-size:0.82rem;font-weight:bold;color:#9bc4e0}
.mv.best{color:var(--best)}
.mv.worst{color:var(--worst)}
.sep{height:1px;background:var(--border);margin:4px 0}
#legend{position:absolute;bottom:10px;left:10px;background:rgba(8,13,24,.92);border:1px solid var(--hi);border-radius:5px;padding:6px 10px;z-index:500}
.lg-ttl{font-family:'Share Tech Mono',monospace;font-size:0.52rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.lg-it{display:flex;align-items:center;gap:6px;margin-bottom:3px;cursor:pointer;transition:opacity .2s}
.lg-it.off{opacity:.28}
.lg-ln{width:20px;height:3px;border-radius:1px;flex-shrink:0}
.lg-tx{font-size:0.72rem;font-weight:700;color:#9bc4e0}
#ibar{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(8,13,24,.88);border:1px solid var(--hi);border-radius:14px;padding:3px 12px;z-index:500;pointer-events:none;font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--muted);white-space:nowrap;max-width:88%;overflow:hidden;text-overflow:ellipsis}
/* leaflet */
.leaflet-container{background:#04080f}
.leaflet-tile{filter:brightness(.5) saturate(.3) hue-rotate(200deg)}
.leaflet-control-zoom{border:1px solid var(--hi)!important}
.leaflet-control-zoom a{background:#0b1220!important;color:var(--accent)!important;border-bottom:1px solid var(--border)!important}
.leaflet-popup-content-wrapper{background:#0d1829!important;border:1px solid var(--hi)!important;border-radius:5px!important;box-shadow:0 4px 18px rgba(0,0,0,.7)!important}
.leaflet-popup-tip{background:#0d1829!important}
.leaflet-popup-content{color:var(--text)!important;font-family:'Share Tech Mono',monospace!important;font-size:0.66rem!important;margin:6px 10px!important}
.pn{font-size:0.85rem;font-weight:700;color:var(--accent);margin-bottom:2px;font-family:'Rajdhani',sans-serif!important}
.ps{color:var(--muted);font-size:0.58rem}
/* modal */
#modal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.78);align-items:center;justify-content:center}
#modal.on{display:flex}
#mbox{background:#0b1220;border:1px solid var(--hi);border-radius:8px;padding:16px;width:min(500px,95vw);max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
#mbox h2{font-size:0.88rem;font-weight:700;color:var(--accent);letter-spacing:.1em}
/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2px}
.tab{flex:1;padding:7px 4px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;transition:all .2s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.pane{display:none}
.pane.on{display:block}
/* img tab */
#dz{border:2px dashed var(--hi);border-radius:6px;padding:20px 14px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:8px}
#dz:hover,#dz.drag{border-color:var(--accent)}
#dz p{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--muted)}
#dz p b{color:var(--accent)}
#fi{display:none}
#prev{width:100%;border-radius:4px;margin-bottom:6px;display:none;max-height:160px;object-fit:contain}
/* txt tab */
#ta{width:100%;height:200px;background:#060c18;border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:0.63rem;padding:7px;resize:vertical;outline:none;line-height:1.5}
#ta:focus{border-color:var(--hi)}
.hint{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--muted);margin-bottom:6px;line-height:1.6}
#mst{font-family:'Share Tech Mono',monospace;font-size:0.66rem;color:var(--muted);min-height:1.1em}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
.mb{background:#0f2a45;border:1px solid var(--hi);border-radius:4px;padding:5px 14px;font-family:'Share Tech Mono',monospace;font-size:0.68rem;color:var(--accent);cursor:pointer}
.mb:hover{background:#142f52}
.mb.pri{background:#1a4060;border-color:var(--accent)}
</style>
</head>
<body>
<div id="hdr">
  <h1>✈ JL759 &nbsp;NRT → SGN</h1>
  <span id="hdr-sub">CITYPAIR COMPARISON</span>
  <button id="inp-btn" onclick="openModal()">📋 入力</button>
</div>
<div id="layout">
  <div id="map-wrap">
    <div id="map"></div>
    <div id="ibar">起動中…</div>
    <div id="legend"><div class="lg-ttl">Routes</div><div id="lg-body"></div></div>
  </div>
  <div id="sidebar">
    <div id="sb-ttl">ROUTE DATA</div>
    <div id="sb-body"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="mbox">
    <h2>📋 CITYPAIR COMPARISON 入力</h2>
    <div class="tabs">
      <button class="tab on" id="t-img" onclick="stab('img')">📷 画像</button>
      <button class="tab" id="t-txt" onclick="stab('txt')">📝 テキスト貼付</button>
    </div>
    <!-- IMAGE PANE -->
    <div class="pane on" id="p-img">
      <div id="dz" onclick="document.getElementById('fi').click()"
           ondragover="event.preventDefault();this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')"
           ondrop="onDrop(event)">
        <p>タップして画像を選択<br><b>または画像をここにドロップ</b></p>
      </div>
      <input type="file" id="fi" accept="image/*" onchange="onFile(this.files[0])">
      <img id="prev" alt="">
      <div class="hint">⬆ 画像を選ぶと自動で「テキスト貼付」タブに切り替わります<br>BRICのCITYPAIR COMPARISONのテキストをそのままコピーして貼り付けてください</div>
    </div>
    <!-- TEXT PANE -->
    <div class="pane" id="p-txt">
      <div class="hint">CITYPAIR COMPARISONのテキストをそのまま貼り付けて「解析」</div>
      <textarea id="ta" placeholder="VRNT 1 RTNG 01R VIA LOZ-Y52N89Q15...
0 OPTD /F400 DCT SAMUS Y84 HCE Y86 YULIA...
COST FUEL 35453 TIME 0 OVRFLT 2161 TOTAL 37614

VRNT 2 ..."></textarea>
    </div>
    <div id="mst"></div>
    <div class="mbtns">
      <button class="mb" onclick="closeModal()">閉じる</button>
      <button class="mb pri" onclick="doParse()">解析して表示</button>
    </div>
  </div>
</div>

let DB = null;

function loadDB() {
  if (DB) return;
  DB = {};
  try {
    // Decode base64
    const binStr = atob(DB_GZ_B64);
    const bytes = new Uint8Array(binStr.length);
    for (let i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
    // Decompress with pako (works on all browsers/iOS versions)
    const inflated = pako.inflate(bytes, {to:'string'});
    DB = JSON.parse(inflated);
  } catch(e) {
    console.warn('DB load error:', e);
  }
}

function lookup(id) {
  if (FIXED[id]) return FIXED[id];
  if (!DB) loadDB();
  return DB[id] || null;
}

// ═══════════════════════════════════
// GC distance (nm)
// ═══════════════════════════════════
function gcNm(a, b) {
  const R=6371*0.5400,r=Math.PI/180;
  const dLat=(b[0]-a[0])*r, dLon=(b[1]-a[1])*r;
  const x=Math.sin(dLat/2)**2+Math.cos(a[0]*r)*Math.cos(b[0]*r)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// Remove implausible waypoints (>800nm hop, or 2.5x detour)
function sanitize(pts) {
  if (pts.length <= 2) return pts;
  const out = [pts[0]];
  for (let i = 1; i < pts.length; i++) {
    const prev = out[out.length-1], cur = pts[i], nxt = pts[i+1];
    const d = gcNm(prev, cur);
    if (d > 800) continue;
    if (nxt) {
      const skip = gcNm(prev, nxt);
      if (skip > 10 && (d + gcNm(cur, nxt)) / skip > 2.5) continue;
    }
    out.push(cur);
  }
  return out;
}

function eet(v) {
  const h=Math.floor(v), m=Math.round((v-h)*100);
  return h+'+'+String(m).padStart(2,'0');
}

// ═══════════════════════════════════
// TEXT PARSER
// ═══════════════════════════════════
const AWY_RE = /^[A-Z]\d|^[A-Z]{2}\d/;
const SKIP = new Set(['DCT','OPTD','DIST','ESAD','MINF','TRIPF','EET','PROFILE','COST',
  'FUEL','TIME','OVRFLT','TOTAL','RTNG','VIA','ZFW','TCF','JA844J','CRA','JAL00263','JA844','26']);

function parseText(raw) {
  const COLORS = ['#00c8ff','#f0a030','#a060ef','#30d070','#ff4858','#f0d060','#d07030'];
  const DASHES = [null,'8,4','11,4','5,3','6,3','9,5',null];
  const blocks = raw.split(/(?=VRNT\s+\d)/);
  const routes = [];
  for (const blk of blocks) {
    if (!/VRNT\s+\d/.test(blk)) continue;
    const idM = blk.match(/VRNT\s+(\d+)/); if (!idM) continue;
    const id = parseInt(idM[1]);
    const viaM = blk.match(/VIA\s+([\w\-\/]+)/);
    const via = (viaM ? viaM[1] : '').replace(/^LOZ[-]/,'');
    const num = tag => { const m=blk.match(new RegExp(tag+'\\s+(\\d+)')); return m?parseInt(m[1]):0; };
    const numF= tag => { const m=blk.match(new RegExp(tag+'\\s+([\\d.]+)')); return m?parseFloat(m[1]):0; };
    // collect OPTD lines
    const lines = blk.split('\n');
    let inO=false, optLines=[];
    for (const ln of lines) {
      if (/OPTD/.test(ln)) inO=true;
      if (inO) {
        if (/^\s*(DIST|PROFILE|COST|MINF)/.test(ln)) { inO=false; break; }
        optLines.push(ln);
      }
    }
    const toks = optLines.join(' ').split(/[\s\/\(\),]+/).map(t=>t.toUpperCase().replace(/[^A-Z0-9]/g,'')).filter(t=>t.length>=2&&t.length<=6);
    const wps = [];
    for (const t of toks) {
      if (!t || SKIP.has(t)) continue;
      if (AWY_RE.test(t)) continue;      // airway
      if (/^\d/.test(t)) continue;       // pure number
      if (/^[A-Z]+$/.test(t)) wps.push(t); // pure alpha = waypoint/VOR
    }
    const i = routes.length;
    routes.push({id, label:'VRNT '+id, via,
      color: COLORS[i%COLORS.length], dash: DASHES[i%DASHES.length],
      fuel:num('FUEL'), time:numF('EET'), ovflt:num('OVRFLT'),
      total:num('TOTAL'), dist:num('DIST'), esad:num('ESAD'),
      rawWps: ['NRT', ...wps.filter(w=>w!=='NRT'&&w!=='SGN'), 'SGN']
    });
  }
  routes.sort((a,b)=>a.id-b.id);
  return routes;
}

// MAP
// ═══════════════════════════════════
const map = L.map('map',{center:[22,118],zoom:5,zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:14}).addTo(map);

let ROUTES=[], layers={}, hidden=new Set(), selId=null;

function resolveRoute(r) {
  const pts = r.rawWps.map(n=>{
    const d=lookup(n); if(!d) return null;
    return {lat:d[0],lon:d[1],type:d[2],name:n,est:d[3]&&d[3].includes('推定')};
  }).filter(Boolean);
  return sanitize(pts);
}

function clearLayers() {
  Object.values(layers).forEach(l=>map.removeLayer(l));
  layers={};
  map.eachLayer(l=>{ if(l instanceof L.CircleMarker) map.removeLayer(l); });
}

function render() {
  loadDB();
  clearLayers();
  const drawn = new Set();
  ROUTES.forEach(r => {
    const pts = resolveRoute(r);
    if (!pts.length) return;
    const poly = L.polyline(pts.map(p=>[p.lat,p.lon]),{
      color:r.color, weight:3, opacity:.85, dashArray:r.dash, lineJoin:'round'
    }).addTo(map);
    poly.on('click',()=>sel(r.id));
    layers[r.id] = poly;
    pts.forEach(p => {
      if (drawn.has(p.name)) return; drawn.add(p.name);
      const isA=p.type==='APT', isV=p.type==='VOR';
      const col = p.est ? '#666' : (isV?'#f0d060':isA?'#7ec8e3':'#4a8aaa');
      L.circleMarker([p.lat,p.lon],{
        radius:isA?8:isV?5:3.5, color:col,
        fillColor:isA?'#1a4060':'#0b1220', fillOpacity:.9, weight:isA?2:1
      }).addTo(map).bindPopup(
        '<div class="pn">'+p.name+'</div>'+
        '<div class="ps">'+p.type+(p.est?' 推定':'')+'</div>'+
        '<div class="ps">'+p.lat.toFixed(4)+'°N &nbsp;'+p.lon.toFixed(4)+'°E</div>',
        {maxWidth:180}
      );
    });
  });
  buildSidebar();
  buildLegend();
  setTimeout(()=>sel(ROUTES[0]?.id), 100);
}

function buildSidebar() {
  const fuels=ROUTES.map(r=>r.fuel), times=ROUTES.map(r=>r.time), tots=ROUTES.map(r=>r.total);
  const mF=Math.min(...fuels),xF=Math.max(...fuels),mT=Math.min(...times),xT=Math.max(...times),mC=Math.min(...tots),xC=Math.max(...tots);
  const el=document.getElementById('sb-body'); el.innerHTML='';
  ROUTES.forEach((r,i)=>{
    const fB=r.fuel===mF,fW=r.fuel===xF,tB=r.time===mT,tW=r.time===xT,cB=r.total===mC,cW=r.total===xC;
    const d=document.createElement('div');
    d.className='rc'; d.id='c'+r.id; d.style.borderLeftColor=r.color;
    d.innerHTML=
      '<div class="rc-top">'+
        '<span class="rc-lbl" style="color:'+r.color+'">'+r.label+'</span>'+
        '<span class="rc-via">'+r.via+'</span>'+
      '</div>'+
      '<div class="rc-g">'+
        '<div class="m"><div class="ml">FUEL</div><div class="mv '+(fB?'best':fW?'worst':'')+'">'+r.fuel.toLocaleString()+'</div></div>'+
        '<div class="m"><div class="ml">TIME</div><div class="mv '+(tB?'best':tW?'worst':'')+'">'+eet(r.time)+'</div></div>'+
        '<div class="m"><div class="ml">OVRFLT</div><div class="mv">'+r.ovflt.toLocaleString()+'</div></div>'+
        '<div class="m"><div class="ml">DIST</div><div class="mv">'+r.dist+'</div></div>'+
        '<div class="m"><div class="ml">ESAD</div><div class="mv">'+r.esad+'</div></div>'+
        '<div class="m"><div class="ml">TOTAL</div><div class="mv '+(cB?'best':cW?'worst':'')+'">'+r.total.toLocaleString()+'</div></div>'+
      '</div>'+
      (i<ROUTES.length-1?'<div class="sep"></div>':'');
    d.addEventListener('click',()=>sel(r.id));
    el.appendChild(d);
  });
}

function buildLegend() {
  const el=document.getElementById('lg-body'); el.innerHTML='';
  ROUTES.forEach(r=>{
    const it=document.createElement('div');
    it.className='lg-it'+(hidden.has(r.id)?' off':''); it.id='g'+r.id;
    it.innerHTML='<div class="lg-ln" style="background:'+r.color+'"></div><span class="lg-tx">'+r.label+'</span>';
    it.addEventListener('click',e=>{e.stopPropagation();tog(r.id);});
    el.appendChild(it);
  });
}

function sel(id) {
  if (!id) return; selId=id;
  const r=ROUTES.find(x=>x.id===id); if(!r) return;
  document.querySelectorAll('.rc').forEach(c=>c.classList.remove('sel'));
  const card=document.getElementById('c'+id);
  if(card){card.classList.add('sel');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  ROUTES.forEach(x=>{
    if(!layers[x.id]||hidden.has(x.id))return;
    layers[x.id].setStyle(x.id===id?{opacity:1,weight:5}:{opacity:.18,weight:2});
  });
  if(layers[id]) map.fitBounds(layers[id].getBounds(),{padding:[28,28]});
  document.getElementById('ibar').textContent=
    r.label+' · '+r.via+' · DIST '+r.dist+'nm / '+eet(r.time)+' / FUEL '+r.fuel.toLocaleString()+'kg';
}

function tog(id) {
  const lg=document.getElementById('g'+id), ca=document.getElementById('c'+id);
  if(hidden.has(id)){
    hidden.delete(id);
    if(layers[id]) layers[id].addTo(map);
    lg&&lg.classList.remove('off'); ca&&ca.classList.remove('off');
  } else {
    hidden.add(id);
    if(layers[id]) map.removeLayer(layers[id]);
    lg&&lg.classList.add('off'); ca&&ca.classList.add('off');
    if(selId===id) selId=null;
  }
}

// ═══════════════════════════════════
// MODAL
// ═══════════════════════════════════
function openModal(){document.getElementById('modal').classList.add('on');document.getElementById('mst').textContent='';}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function stab(t){
  ['img','txt'].forEach(x=>{
    document.getElementById('t-'+x).classList.toggle('on',x===t);
    document.getElementById('p-'+x).classList.toggle('on',x===t);
  });
}
function onDrop(ev){ev.preventDefault();ev.stopPropagation();document.getElementById('dz').classList.remove('drag');const f=ev.dataTransfer.files[0];if(f)onFile(f);}
function onFile(f){
  if(!f||!f.type.startsWith('image/'))return;
  const r=new FileReader();
  r.onload=e=>{
    const p=document.getElementById('prev');p.src=e.target.result;p.style.display='block';
    document.getElementById('mst').textContent='画像を読み込みました。テキストタブに切り替えてBRICの文字を貼り付けてください。';
    stab('txt');
  };
  r.readAsDataURL(f);
}
function doParse(){
  const raw=document.getElementById('ta').value.trim();
  const st=document.getElementById('mst');
  if(!raw){st.textContent='⚠ テキストを貼り付けてください';return;}
  const routes=parseText(raw);
  if(!routes.length){st.textContent='❌ VRNTブロックが見つかりませんでした';return;}
  ROUTES=routes; hidden.clear(); selId=null;
  document.getElementById('hdr-sub').textContent='読込済 · '+routes.length+'ルート';
  closeModal(); render();
}
